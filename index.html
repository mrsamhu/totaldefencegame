<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape the Command Center: SG Deterrence</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #1a2235;
            --text-main: #e2e8f0;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #334155;
            --terminal-bg: #000000;
            --terminal-text: #22c55e;
            --hint-color: #eab308;
        }

        * { box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 20px; color: var(--accent-blue); text-transform: uppercase; }
        .room-indicator { font-weight: bold; font-size: 16px; color: var(--accent-green); text-align: right;}

        .scenario-box {
            background: #0f172a;
            padding: 20px;
            border-left: 4px solid var(--accent-blue);
            border-radius: 4px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 16px;
        }
